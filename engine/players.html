<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Kill · 球员图鉴</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23f97316'/><path d='M50 8 v84 M8 50 h84' stroke='%231a1a2e' stroke-width='3' fill='none'/><path d='M14 30 Q 50 50 86 30 M14 70 Q 50 50 86 70' stroke='%231a1a2e' stroke-width='3' fill='none'/></svg>">
  <style>
    :root {
      --bg-primary: #0d0d1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #252542;
      --bg-active: #2d2d4a;
      --border: #3d3d5c;
      --primary: #f39c12;
      --text: #ecf0f1;
      --text-muted: #95a5a6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      background: var(--bg-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: var(--text);
      font-size: 14px;
    }
    .roster-page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 22px;
      background: var(--bg-secondary);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .roster-back-btn {
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .roster-back-btn:hover { background: var(--bg-active); border-color: var(--primary); }
    .roster-title { font-size: 20px; font-weight: 700; color: var(--primary); }
    .roster-stat {
      font-size: 12px;
      color: var(--text-muted);
      padding: 3px 10px;
      background: var(--bg-card);
      border-radius: 10px;
    }
    .roster-page-body {
      padding: 22px 28px 60px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .roster-group { display: flex; flex-direction: column; gap: 12px; }
    .roster-group-title {
      font-size: 16px;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
    }
    .roster-group-title.pos-inside { background: rgba(22, 163, 74, 0.18); color: #16a34a; border-left: 3px solid #16a34a; }
    .roster-group-title.pos-guard { background: rgba(47, 128, 237, 0.18); color: #2f80ed; border-left: 3px solid #2f80ed; }
    .roster-group-title.pos-forward { background: rgba(225, 29, 72, 0.18); color: #e11d48; border-left: 3px solid #e11d48; }
    .roster-group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 14px;
    }
    .roster-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, transform 0.15s;
    }
    .roster-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(243, 156, 18, 0.15); }
    .roster-card-head { display: flex; align-items: center; gap: 12px; }
    .roster-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .roster-avatar-fallback {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--primary); color: #1a1a2e;
      font-size: 28px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .roster-name { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .roster-name-en { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .roster-tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .roster-tag {
      font-size: 11px; padding: 2px 7px; border-radius: 8px;
      background: rgba(255, 255, 255, 0.08); color: var(--text-muted); font-weight: 600;
    }
    .roster-tag.hp-tag { color: #ef4444; background: rgba(239, 68, 68, 0.15); }
    .roster-tag.nick { color: #fbbf24; background: rgba(251, 191, 36, 0.15); }
    .roster-bio {
      font-size: 12px; color: var(--text-muted); line-height: 1.55;
      padding: 8px 10px; background: rgba(0, 0, 0, 0.22);
      border-radius: 6px; border-left: 2px solid var(--border);
    }
    .roster-skills { display: flex; flex-direction: column; gap: 7px; }
    .roster-skill {
      padding: 8px 10px;
      background: rgba(243, 156, 18, 0.08);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
    }
    .roster-skill-name { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
    .roster-skill-desc { font-size: 12px; color: var(--text); line-height: 1.5; }

    @media (max-width: 768px) {
      .roster-page-header { padding: 10px 12px; gap: 8px; }
      .roster-page-body { padding: 14px 12px 40px; gap: 18px; }
      .roster-title { font-size: 16px; }
      .roster-group-title { font-size: 14px; padding: 5px 10px; }
      .roster-group-grid { grid-template-columns: 1fr; gap: 10px; }
      .roster-card { padding: 11px 13px; }
      .roster-avatar, .roster-avatar-fallback { width: 52px; height: 52px; font-size: 22px; }
      .roster-name { font-size: 15px; }
    }
  </style>
</head>
<body>
  <header class="roster-page-header">
    <a class="roster-back-btn" href="./">← 返回游戏</a>
    <span class="roster-title">🏀 NBA Kill 球员图鉴</span>
    <span class="roster-stat" id="roster-total">16 人</span>
  </header>
  <main class="roster-page-body" id="roster-page-body">
    <!-- 由 players.bundle.js 渲染填充 -->
  </main>
  <script src="players.bundle.js"></script>
</body>
</html>
